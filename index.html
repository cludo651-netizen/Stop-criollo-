<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stop Criollo - Williams Edition</title>
    <style>
        :root { --azul: #0077ff; --rojo: #ff4d4d; --papel: #fdfdfd; --verde: #25D366; }
        body { 
            margin: 0; font-family: 'Comic Sans MS', cursive, sans-serif; 
            background: #ccc; background-image: linear-gradient(var(--papel) 95%, #e0e0e0 100%);
            background-size: 100% 30px; display: flex; justify-content: center; min-height: 100vh;
            overflow-x: hidden;
        }
        body::before { content: ''; position: fixed; left: 40px; top: 0; bottom: 0; width: 2px; background: var(--rojo); z-index: 0; }
        .container { width: 100%; max-width: 500px; padding: 20px; z-index: 1; text-align: center; position: relative; }
        
        button { 
            background: var(--azul); color: white; border: none; padding: 15px; 
            border-radius: 15px; font-size: 18px; width: 85%; margin: 8px 0;
            box-shadow: 0 5px #0056b3; cursor: pointer; transition: 0.2s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 1px #0056b3; }
        .btn-volver { background: #666 !important; box-shadow: 0 5px #444 !important; width: 60%; font-size: 14px; }
        .hidden { display: none; }
        
        .scroll-juego { max-height: 55vh; overflow-y: auto; padding: 10px; background: rgba(255,255,255,0.6); border-radius: 15px; border: 1px solid #ddd; }
        .input-juego { width: 90%; padding: 12px; margin: 6px 0; border: 2px solid var(--azul); border-radius: 12px; font-size: 16px; outline: none; }

        /* Panel de Emojis */
        .panel-emojis {
            position: fixed; bottom: 85px; right: 20px; display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; background: white; padding: 12px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 100;
        }
        .btn-em { font-size: 25px; background: none; border: none; width: 45px; height: 45px; box-shadow: none; margin: 0; padding: 0; }
        
        .emoji-animado {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 120px; animation: pop 2s forwards; z-index: 1000; pointer-events: none;
        }
        @keyframes pop { 0% { scale: 0; opacity: 0; } 50% { scale: 1.5; opacity: 1; } 100% { transform: translate(-50%, -150%); opacity: 0; } }
        
        .sala-box { background:white; padding:15px; border-radius:15px; border:3px dashed var(--azul); margin: 15px 0; }
    </style>
</head>
<body>

<audio id="musica-fondo" loop preload="auto">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>
<audio id="sonido-stop" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <div id="p-inicio">
        <h1 style="font-size: 35px;">🇻🇪 STOP CRIOLLO 🇻🇪</h1>
        <p>¡Hablame, Williams!</p>
        <button onclick="activarMusicaYEntrar()" style="background: #ffeb3b; color: black; box-shadow: 0 5px #c6a700;">🔊 ACTIVAR MÚSICA Y ENTRAR</button>
    </div>

    <div id="p-menu" class="hidden">
        <h2>¿CÓMO VAMOS A JUGAR?</h2>
        <button onclick="mostrarCrear()">CREAR SALA (QR)</button>
        <button onclick="navegar('p-unirse')">UNIRSE A SALA</button>
        <button onclick="mostrarRanking()">RANKING MENSUAL</button>
        <button class="btn-volver" onclick="navegar('p-inicio')">CERRAR SESIÓN</button>
    </div>

    <div id="p-crear" class="hidden">
        <h3>SALA CREADA</h3>
        <div class="sala-box">
            <h1 id="codigo-txt" style="color:var(--azul); margin: 5px 0;">STOP-777</h1>
            <img id="qr-img" src="" width="160" height="160" style="background:#fff; padding:5px; border-radius:10px;">
            <p style="font-size:14px; font-weight:bold;">¡PÁSALO PARA QUE ESCANEEN!</p>
        </div>
        <button onclick="compartir()" style="background:#ff9800; box-shadow:0 5px #e68a00;">📤 COMPARTIR TODO</button>
        <button onclick="navegar('p-juego')" style="background:var(--verde); box-shadow:0 5px #128C7E;">¡INICIAR PARTIDA!</button>
        <button class="btn-volver" onclick="navegar('p-menu')">VOLVER</button>
    </div>

    <div id="p-juego" class="hidden">
        <h2 style="color:var(--rojo); margin-bottom:5px;">LETRA: <span id="letra">B</span></h2>
        <div class="scroll-juego">
            <input type="text" class="input-juego" placeholder="1. Nombre">
            <input type="text" class="input-juego" placeholder="2. Apellido">
            <input type="text" class="input-juego" placeholder="3. Animal">
            <input type="text" class="input-juego" placeholder="4. Fruta o Comida">
            <input type="text" class="input-juego" placeholder="5. Color">
            <input type="text" class="input-juego" placeholder="6. Cosa u Objeto">
            <input type="text" class="input-juego" placeholder="7. País o Ciudad">
            <input type="text" class="input-juego" placeholder="8. Profesión">
            <input type="text" class="input-juego" placeholder="9. Famoso">
            <input type="text" class="input-juego" placeholder="10. Prenda de vestir">
        </div>
        <button onclick="cantarStop()" style="background:var(--rojo); box-shadow:0 5px #b30000; font-size:25px; height:70px;">¡STOP!</button>
        <button class="btn-volver" onclick="navegar('p-menu')">SALIR</button>
    </div>

    <div id="p-ranking" class="hidden">
        <h2 id="mes-titulo">RANKING MENSUAL</h2>
        <div class="sala-box" style="text-align: left;">
            <p>🥇 1. Williams - 2500 pts</p>
            <p>🥈 2. El Pana - 1800 pts</p>
            <p>🥉 3. Invitado - 500 pts</p>
        </div>
        <p style="font-size: 11px; color: #666;">* Se reinicia el primer día de cada mes *</p>
        <button class="btn-volver" onclick="navegar('p-menu')">VOLVER</button>
    </div>
</div>

<div id="reacciones" class="hidden">
    <div id="menu-emojis" class="panel-emojis hidden">
        <button class="btn-em" onclick="enviarEmoji('😂')">😂</button>
        <button class="btn-em" onclick="enviarEmoji('😡')">😡</button>
        <button class="btn-em" onclick="enviarEmoji('😎')">😎</button>
        <button class="btn-em" onclick="enviarEmoji('🔥')">🔥</button>
        <button class="btn-em" onclick="enviarEmoji('😲')">😲</button>
        <button class="btn-em" onclick="enviarEmoji('💩')">💩</button>
    </div>
    <button onclick="toggleEmojis()" style="width:60px; height:60px; border-radius:50%; position:fixed; bottom:15px; right:15px; font-size:30px; background:white; border:3px solid var(--azul); box-shadow:0 4px 10px rgba(0,0,0,0.3);">😊</button>
</div>

<script>
    const mFondo = document.getElementById('musica-fondo');
    const sStop = document.getElementById('sonido-stop');
    const linkBase = "https://cludo651-netizen.github.io/Stop-criollo-/";

    function activarMusicaYEntrar() {
        mFondo.play().catch(() => console.log("Música esperando interacción"));
        navegar('p-menu');
    }

    function navegar(id) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'p-juego' || id === 'p-crear') document.getElementById('reacciones').classList.remove('hidden');
        else document.getElementById('reacciones').classList.add('hidden');
    }

    function mostrarCrear() {
        const cod = "STOP-" + Math.floor(100 + Math.random() * 900);
        document.getElementById('codigo-txt').innerText = cod;
        document.getElementById('qr-img').src = `https://chart.googleapis.com/chart?chs=160x160&cht=qr&chl=${encodeURIComponent(linkBase+"?s="+cod)}`;
        navegar('p-crear');
    }

    function cantarStop() {
        sStop.play();
        alert("¡¡¡STOOP!!! 🛑\nHora de sumar:\n- Única: 100\n- Repetida: 50\n- Inventada: 75\n- Error ortográfico: -5 pts");
        navegar('p-menu');
    }

    function mostrarRanking() {
        const meses = ["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
        document.getElementById('mes-titulo').innerText = "RANKING DE " + meses[new Date().getMonth()];
        navegar('p-ranking');
    }

    function compartir() {
        const txt = `¡Epa pana! Únete a mi partida de Stop Criollo 🇻🇪\nCódigo: ${document.getElementById('codigo-txt').innerText}\nJuega aquí: ${linkBase}`;
        if(navigator.share) navigator.share({title:'Stop Criollo', text:txt, url:linkBase});
        else window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
    }

    function toggleEmojis() { document.getElementById('menu-emojis').classList.toggle('hidden'); }
    
    function enviarEmoji(e) {
        const div = document.createElement('div');
        div.className = 'emoji-animado'; div.innerText = e;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2000);
        toggleEmojis();
    }
</script>
</body>
</html>
